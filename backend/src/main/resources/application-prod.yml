# 운영 환경 설정 (모든 민감 정보는 환경변수로 주입)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true  # Railway 기존 DB 안전 처리
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate     # Flyway 마이그레이션 후 엔티티-스키마 정합성 검증
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    com.sungkyul.cafeteria: INFO