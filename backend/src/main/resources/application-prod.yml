# 운영 환경 설정 (모든 민감 정보는 환경변수로 주입)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
  flyway:
    baseline-on-migrate: true  # Railway 기존 DB 안전 처리
    locations: classpath:db/migration
    out-of-order: true         # V12-V16 선적용 후 V11 추가 시 순서 무관 실행 허용
  jpa:
    hibernate:
      ddl-auto: validate     # Flyway 마이그레이션 후 엔티티-스키마 정합성 검증
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  allowed-origins: ${ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 3600000
    refresh-expiration: 604800000

cron:
  secret: ${CRON_SECRET}

logging:
  level:
    root: INFO
    com.sungkyul.cafh oteria: INFO
