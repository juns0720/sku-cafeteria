# 개발 환경 설정
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sungkyul_cafeteria
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true  # 기존 DB에 flyway_schema_history 없을 때 V1을 baseline으로 표시
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none         # Flyway가 DDL 관리 — Hibernate 자동 갱신 비활성화
    show-sql: true           # 실행 쿼리 콘솔 출력
    properties:
      hibernate:
        format_sql: true     # SQL 가독성 향상

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-long-enough-for-hmac-sha256-ok}
    access-expiration: 3600000    # 1시간 (ms)
    refresh-expiration: 604800000 # 7일 (ms)

scheduling:
  enabled: true

logging:
  level:
    root: DEBUG
    com.sungkyul.cafeteria: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
